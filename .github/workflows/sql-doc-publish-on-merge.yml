name: SQL Doc Publish On Merge

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  publish-after-merge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SQL repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          token: ${{ secrets.SQL_GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Validate required secrets
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          TOOL_REPO_TOKEN: ${{ secrets.TOOL_REPO_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
        run: |
          missing=""
          [ -z "$LLM_API_KEY" ] && missing="$missing LLM_API_KEY"
          [ -z "$CONFLUENCE_USERNAME" ] && missing="$missing CONFLUENCE_USERNAME"
          [ -z "$CONFLUENCE_API_TOKEN" ] && missing="$missing CONFLUENCE_API_TOKEN"
          [ -z "$TOOL_REPO_TOKEN" ] && missing="$missing TOOL_REPO_TOKEN"
          [ -z "$SQL_GITHUB_TOKEN" ] && missing="$missing SQL_GITHUB_TOKEN"
          if [ -n "$missing" ]; then
            echo "Missing required repository secrets:$missing"
            exit 1
          fi

      - name: Checkout tool repository
        uses: actions/checkout@v4
        with:
          repository: ask4anshuman/Code-Summarization-Project
          path: sql-doc-tool
          token: ${{ secrets.TOOL_REPO_TOKEN }}
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tool dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sql-doc-tool/requirements.txt

      - name: Publish approved SQL docs to Confluence
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          python sql-doc-tool/main.py --config .github/sql_confluence.yml --repo Anshuman_SQL_repo publish-merged --pr-number "$PR_NUMBER"

      - name: Move Confluence link comment to line 4 in SQL files
        run: |
          python - <<'PY'
          from pathlib import Path

          marker_prefix = "-- [Doc] Confluence:"
          updated = 0

          for sql_file in Path('.').rglob('*.sql'):
            text = sql_file.read_text(encoding='utf-8')
            lines = text.splitlines()

            marker_index = None
            for idx, line in enumerate(lines):
              if line.startswith(marker_prefix):
                marker_index = idx
                break

            if marker_index is None:
              continue

            # Keep the original comment line in place and only push it down by
            # inserting blank lines above it until it lands on line 4.
            if marker_index < 3:
              pad_count = 3 - marker_index
              lines = ([""] * pad_count) + lines
              new_text = '\n'.join(lines)
              if text.endswith('\n'):
                new_text += '\n'
              sql_file.write_text(new_text, encoding='utf-8')
              updated += 1
              print(f"Pushed Confluence comment to line 4 in {sql_file}")

          print(f"Total SQL files normalized: {updated}")
          PY

      - name: Commit Confluence documentation links back to SQL files
        env:
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}
        run: |
          git config user.name "sql-doc-bot"
          git config user.email "sql-doc-bot@noreply.github.com"
          echo "Scanning for SQL file modifications..."
          git status --short
          git add -A -- '*.sql' '**/*.sql'
          if ! git diff --cached --quiet; then
            echo "Staged SQL files:"
            git diff --cached --name-only -- '*.sql' '**/*.sql'
            git commit -m "docs: add Confluence documentation links to SQL files [skip ci]"
            git push origin "HEAD:${TARGET_BRANCH}"
            echo "Committed Confluence links to SQL files."
          else
            echo "No SQL files changed by link injection, skipping commit."
          fi