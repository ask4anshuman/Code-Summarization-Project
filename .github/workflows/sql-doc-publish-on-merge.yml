name: SQL Doc Publish On Merge

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  publish-after-merge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SQL repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: true

      - name: Validate required secrets
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          TOOL_REPO_TOKEN: ${{ secrets.TOOL_REPO_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
        run: |
          missing=""
          [ -z "$LLM_API_KEY" ] && missing="$missing LLM_API_KEY"
          [ -z "$CONFLUENCE_USERNAME" ] && missing="$missing CONFLUENCE_USERNAME"
          [ -z "$CONFLUENCE_API_TOKEN" ] && missing="$missing CONFLUENCE_API_TOKEN"
          [ -z "$TOOL_REPO_TOKEN" ] && missing="$missing TOOL_REPO_TOKEN"
          [ -z "$SQL_GITHUB_TOKEN" ] && missing="$missing SQL_GITHUB_TOKEN"
          if [ -n "$missing" ]; then
            echo "Missing required repository secrets:$missing"
            exit 1
          fi

      - name: Checkout tool repository
        uses: actions/checkout@v4
        with:
          repository: ask4anshuman/Code-Summarization-Project
          path: sql-doc-tool
          token: ${{ secrets.TOOL_REPO_TOKEN }}
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tool dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sql-doc-tool/requirements.txt

      - name: Publish approved SQL docs to Confluence
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          python sql-doc-tool/main.py --config .github/sql_confluence.yml --repo Anshuman_SQL_repo publish-merged --pr-number "$PR_NUMBER"