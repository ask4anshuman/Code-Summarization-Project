name: SQL Confluence Publish On Merge

on:
  pull_request:
    types: [closed]

jobs:
  publish-confluence:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish merged PR SQL docs to Confluence
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
        run: |
          python main.py --config sql_confluence.yml publish-merged --pr-number ${{ github.event.pull_request.number }}
